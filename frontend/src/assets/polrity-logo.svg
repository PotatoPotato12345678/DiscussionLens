<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100" height="60">
  <defs>
    <clipPath id="leftClip">
      <circle cx="35" cy="30" r="22"/>
    </clipPath>
    <clipPath id="rightClip">
      <circle cx="65" cy="30" r="22"/>
    </clipPath>
  </defs>
  <!-- Left circle: blue -->
  <circle cx="35" cy="30" r="22" fill="#3b82f6" opacity="0.9"/>
  <!-- Right circle: orange -->
  <circle cx="65" cy="30" r="22" fill="#f97316" opacity="0.9"/>
  <!-- Overlap highlight -->
  <circle cx="65" cy="30" r="22" fill="#ffffff" opacity="0.15" clip-path="url(#leftClip)"/>
</svg>
